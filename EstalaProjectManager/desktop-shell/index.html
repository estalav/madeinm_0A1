<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Estala Project Manager</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6efe4;
        --panel: rgba(255, 250, 241, 0.94);
        --line: rgba(23, 33, 38, 0.1);
        --ink: #172126;
        --muted: #5e7389;
        --accent: #17313c;
        --accent-soft: #d9ece7;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(15, 118, 110, 0.16), transparent 28%),
          linear-gradient(180deg, #f9f2e8 0%, #f6efe4 52%, #f2e8da 100%);
        color: var(--ink);
        font-family: "Geist", ui-sans-serif, system-ui, sans-serif;
      }

      .panel {
        width: min(560px, calc(100vw - 32px));
        border: 1px solid var(--line);
        border-radius: 28px;
        padding: 28px;
        background: var(--panel);
        box-shadow: 0 20px 60px rgba(47, 38, 24, 0.12);
      }

      .eyebrow {
        margin: 0;
        font-size: 12px;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        color: #5f8f8a;
      }

      h1 {
        margin: 14px 0 10px;
        font-size: clamp(32px, 5vw, 48px);
        line-height: 1;
      }

      p {
        margin: 0;
        font-size: 18px;
        line-height: 1.7;
        color: var(--muted);
      }

      .status {
        margin-top: 22px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        border-radius: 999px;
        background: var(--accent-soft);
        padding: 10px 16px;
        color: #115e59;
        font-size: 14px;
        font-weight: 600;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #14b8a6;
      }

      .actions {
        margin-top: 26px;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      a {
        border-radius: 999px;
        padding: 12px 18px;
        text-decoration: none;
        font-weight: 600;
      }

      .primary {
        background: #c96f44;
        color: white;
      }

      .secondary {
        border: 1px solid var(--line);
        color: var(--accent);
        background: white;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <p class="eyebrow">Estala PM Desktop</p>
      <h1>Opening your workspace</h1>
      <p>
        This macOS build uses the live shared backend so your desktop app and web
        app stay in sync.
      </p>
      <div class="status">
        <span class="dot"></span>
        Redirecting to the live workspace...
      </div>
      <div class="actions">
        <a class="primary" href="https://estala-project-manager.vercel.app">
          Open workspace now
        </a>
        <a class="secondary" href="https://estala-project-manager.vercel.app/api/projects">
          Check API
        </a>
      </div>
    </main>
    <script>
      window.setTimeout(() => {
        window.location.replace("https://estala-project-manager.vercel.app");
      }, 900);
    </script>
  </body>
  </html>
